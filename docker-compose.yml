services:
  redis:
    image: redis:7-alpine
    container_name: stv_cms_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: stv_cms_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-stv}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stv123}
      POSTGRES_DB: ${DB:-stvcms}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./doc/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-stv} -d ${DB:-stvcms}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  postgres_data:
